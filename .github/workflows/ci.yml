name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test And Userspace Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang llvm make

      - name: Shell Syntax
        run: |
          for script in scripts/*.sh; do
            bash -n "$script"
          done

      - name: Embedded BPF Freshness
        run: |
          bash scripts/update-embedded-bpf.sh --check

      - name: WebUI Check
        run: |
          npm ci
          npm run webui:check
          npm run webui:build

      - name: Go Test
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t pkgs < <(go list ./cmd/... ./internal/... ./scripts | grep -v '^trustix.local/trustix/internal/dataplane/ebpf$')
          go test "${pkgs[@]}" -count=1
          go test ./internal/dataplane/ebpf -run '^$' -count=1
          go test ./internal/dataplane/ebpf \
            -run '^Test(ErrorCleanupStack|BackgroundTaskTracker|AFXDPSocketClose|KernelUDPUDPFallbackSocketSetClose|CleanupQuarantinesSemantic|PersistedRouteStateMaps|WriteDataplaneStateAtomic|AttachRollsBackAfterStatePersistenceFailure|ApplySnapshotRestoresFlowsAfterStatePersistenceFailure|ApplySnapshotRewritesPreviousStateAfterCommittedSyncFailure|TIXTCPStatusRetriesFailedPrunePersistence|SyncPendingKernelTransportStateDoesNotAttachFastPathBeforeManagerAttach|ApplyNATSnapshotRestoresPreviousSnapshotAfterPersistenceFailure)' \
            -count=1

      - name: Go Error And Race Checks
        run: |
          go vet ./...
          go run github.com/kisielk/errcheck@v1.9.0 -blank -ignoretests ./...
          go test -race -count=1 ./internal/configlog ./internal/daemon

      - name: Transactional Update Smoke
        run: |
          bash scripts/trustix-update-smoke.sh

      - name: Transactional Deploy Smoke
        run: |
          bash scripts/trustix-deploy-smoke.sh

      - name: Uninstall Lifecycle Smoke
        run: |
          bash scripts/trustix-uninstall-smoke.sh

      - name: OpenWrt Init Discovery Smoke
        run: |
          sh scripts/trustix-openwrt-init-smoke.sh

      - name: Encrypted Backup Recovery Smoke
        run: |
          bash scripts/trustix-backup-smoke.sh

      - name: Active Standby Lifecycle Smoke
        run: |
          bash scripts/trustix-ha-smoke.sh

      - name: Production Transport Evidence Audit
        run: |
          python3 scripts/production-transport-audit.py \
            --scope cross_host \
            --require-manifest \
            --require-current \
            --require-artifact-reference \
            --require-current-build-ancestor \
            --require-current-gate-tools \
            --require-current-runtime-tree \
            --fail-on-missing

      - name: Security Smoke
        run: |
          TRUSTIX_SECURITY_SMOKE_GO_TESTS=0 \
          TRUSTIX_SECURITY_SMOKE_CONTROL=1 \
          TRUSTIX_SECURITY_SMOKE_ROOT=0 \
          bash scripts/linux-security-smoke.sh

      - name: Build Userspace Release
        run: |
          bash scripts/trustix-build.sh \
            --out build/ci-release \
            --name trustix-linux-amd64-ci \
            --goarch amd64 \
            --build-bpf 1 \
            --build-ko 0 \
            --build-tests 0 \
            --skip-webui \
            --json
